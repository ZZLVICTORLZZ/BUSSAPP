


<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BusCount V5.2 - WhatsApp</title>
    <style>
        :root { --p: #00e5ff; --bg: #000; --c: #1a1a1a; --wa: #25d366; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 10px; text-align: center; }
        .pantalla { display: none; }
        .activa { display: block !important; }
        .tarjeta { background: var(--c); padding: 15px; border-radius: 15px; border: 1px solid #333; margin-bottom: 10px; }
        .btn { border: none; padding: 18px; border-radius: 12px; font-weight: bold; width: 100%; margin-top: 10px; font-size: 1.1rem; cursor: pointer; }
        .btn-turquesa { background: var(--p); color: #000; }
        .btn-gris { background: #333; color: #fff; }
        .btn-wa { background: var(--wa); color: #000; }
        .btn-rojo { background: #b71c1c; color: #fff; }
        input { background: #000; color: var(--p); border: 1px solid var(--p); padding: 10px; width: 80%; font-size: 1.5rem; text-align: center; border-radius: 8px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        select { background: #222; color: var(--p); border: 1px solid var(--p); padding: 12px; width: 100%; font-size: 1.2rem; border-radius: 10px; }
    </style>
</head>
<body onload="iniciarApp()">

    <div style="font-size: 0.8rem; color: #444;">VERSIÓN 5.2 - LISTO PARA WHATSAPP</div>

    <div id="p-reg" class="pantalla activa">
        <div class="tarjeta">
            <h2 id="txt-v" style="color:var(--p); margin:0;">1ª MEDIA VUELTA</h2>
            <select id="sel-d" style="margin-top:10px;">
                <option value="INDIOS VERDES">INDIOS VERDES</option>
                <option value="NUEVOS PASEOS">NUEVOS PASEOS</option>
                <option value="REYES">REYES</option>
            </select>
            <div style="font-size: 3.5rem; font-weight: bold; color: var(--p);">$<span id="t-v">0</span></div>
            <div id="log-ex" style="font-size: 0.9rem; color: #00e5ff;"></div>
        </div>

        <div class="tarjeta">
            <div class="grid">
                <div><label style="color:#888; font-size:0.8rem;">$14</label><br><input type="number" id="i14" oninput="sumar()"></div>
                <div><label style="color:#888; font-size:0.8rem;">$55</label><br><input type="number" id="i55" oninput="sumar()"></div>
                <div><label style="color:#888; font-size:0.8rem;">$47</label><br><input type="number" id="i47" oninput="sumar()"></div>
                <div><label style="color:#888; font-size:0.8rem;">$37</label><br><input type="number" id="i37" oninput="sumar()"></div>
            </div>
            <div style="margin-top:15px; border-top:1px solid #333; padding-top:10px;">
                <label style="color:#888;">COBRO LIBRE</label>
                <div class="grid">
                    <input type="number" id="l-p" placeholder="Precio">
                    <input type="number" id="l-c" placeholder="Cant.">
                </div>
                <button class="btn btn-gris" style="color:var(--p)" onclick="agregarLibre()">+ AGREGAR COBRO LIBRE</button>
            </div>
        </div>

        <button class="btn btn-turquesa" onclick="finalizar()">FINALIZAR VUELTA</button>
        <button class="btn btn-gris" onclick="irA('p-lib')">VER LIBRO DE RUTA</button>
    </div>

    <div id="p-lib" class="pantalla">
        <div class="tarjeta">
            <h2 style="color:var(--p);">RESUMEN DEL DÍA</h2>
            <div id="t-dia" style="font-size: 2.5rem; color:var(--p); font-weight:bold;">$0</div>
        </div>
        <div id="lista" class="tarjeta" style="padding:0; text-align:left;"></div>
        
        <button class="btn btn-wa" onclick="enviarWhatsApp()">✅ ENVIAR REPORTE WHATSAPP</button>
        <button class="btn btn-turquesa" onclick="irA('p-reg')">VOLVER A COBRAR</button>
        <button class="btn btn-rojo" onclick="reset()">BORRAR TODO EL DÍA</button>
    </div>

    <script>
        var numV = parseInt(localStorage.getItem('v_n')) || 1;
        var hist = JSON.parse(localStorage.getItem('v_h')) || [];
        var extra = 0;

        function iniciarApp() {
            render();
        }

        function sumar() {
            var v14 = (document.getElementById('i14').value || 0) * 14;
            var v55 = (document.getElementById('i55').value || 0) * 55;
            var v47 = (document.getElementById('i47').value || 0) * 47;
            var v37 = (document.getElementById('i37').value || 0) * 37;
            document.getElementById('t-v').innerText = (v14 + v55 + v47 + v37 + extra);
        }

        function agregarLibre() {
            var p = parseFloat(document.getElementById('l-p').value) || 0;
            var c = parseInt(document.getElementById('l-c').value) || 0;
            if (p > 0 && c > 0) {
                extra += (p * c);
                document.getElementById('log-ex').innerText = "Extra: +$" + extra;
                document.getElementById('l-p').value = "";
                document.getElementById('l-c').value = "";
                sumar();
            }
        }

        function finalizar() {
            var m = parseInt(document.getElementById('t-v').innerText);
            var d = document.getElementById('sel-d').value;
            if (m === 0) { if(!confirm("¿Guardar en $0?")) return; }
            hist.push({n: numV, d: d, m: m});
            localStorage.setItem('v_h', JSON.stringify(hist));
            numV++;
            localStorage.setItem('v_n', numV);
            document.getElementById('i14').value=""; document.getElementById('i55').value="";
            document.getElementById('i47').value=""; document.getElementById('i37').value="";
            extra = 0; document.getElementById('log-ex').innerText = "";
            irA('p-lib');
        }

        function render() {
            document.getElementById('txt-v').innerText = numV + "ª MEDIA VUELTA";
            var h = ""; var total = 0;
            hist.forEach(function(v) {
                h += '<div style="display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid #333;">' +
                     '<span><b>' + v.n + 'ª</b> ' + v.d + '</span><span>$' + v.m + '</span></div>';
                total += v.m;
            });
            document.getElementById('lista').innerHTML = h || "<p style='padding:15px; color:#555;'>Sin datos registrados</p>";
            document.getElementById('t-dia').innerText = "$" + total;
            sumar();
        }

        function irA(id) {
            document.getElementById('p-reg').classList.remove('activa');
            document.getElementById('p-lib').classList.remove('activa');
            document.getElementById(id).classList.add('activa');
            render();
        }

        function reset() {
            if (confirm("¿Borrar todo el día?")) {
                localStorage.clear();
                location.reload();
            }
        }

        // FUNCIÓN DE WHATSAPP
        function enviarWhatsApp() {
            if (hist.length === 0) {
                alert("No hay datos para enviar.");
                return;
            }
            var mensaje = "REPORTE DE RUTA - BUSCOUNT%0A";
            mensaje += "----------------------------%0A";
            hist.forEach(function(v) {
                mensaje += v.n + "ª " + v.d + ": $" + v.m + "%0A";
            });
            mensaje += "----------------------------%0A";
            mensaje += "TOTAL DEL DÍA: " + document.getElementById('t-dia').innerText + "";
            
            // Abre WhatsApp con el mensaje listo
            window.open("https://wa.me/?text=" + mensaje, "_blank");
        }
    </script>
</body>
</html>

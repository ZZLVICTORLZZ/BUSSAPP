
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BusCount - Destinos</title>
    <style>
        :root { --p: #ff9800; --bg: #000; --c: #1a1a1a; --txt: #fff; }
        body { background: var(--bg); color: var(--txt); font-family: sans-serif; margin: 0; padding: 15px; text-align: center; }
        
        .pantalla { display: none; }
        .activa { display: block !important; }
        
        .tarjeta { background: var(--c); padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 12px; }
        
        .letrero-vuelta { font-size: 1.6rem; color: var(--p); font-weight: bold; text-transform: uppercase; margin-bottom: 10px; }
        
        /* Estilo para el Selector de Destino */
        .selector-destino {
            background: #222;
            color: var(--p);
            border: 1px solid var(--p);
            padding: 12px;
            width: 100%;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
        }

        .monto-actual { font-size: 3.5rem; color: var(--p); font-weight: bold; margin: 10px 0; }
        
        .btn { border: none; padding: 20px; border-radius: 12px; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; font-size: 1.2rem; }
        .btn-naranja { background: var(--p); color: #000; }
        .btn-gris { background: #333; color: #fff; }
        .btn-rojo { background: #b71c1c; color: #fff; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .campo { background: #222; padding: 10px; border-radius: 10px; border: 1px solid #444; }
        input { background: #000; color: var(--p); border: 1px solid var(--p); padding: 12px; width: 80%; font-size: 1.8rem; text-align: center; border-radius: 8px; }
        label { display: block; font-size: 0.9rem; color: #888; margin-bottom: 5px; font-weight: bold; }

        .fila-historial { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #333; font-size: 1.1rem; }
    </style>
</head>
<body onload="iniciar()">

    <div id="pantalla-cobro" class="pantalla activa">
        <div class="tarjeta">
            <div id="txt-vuelta-grande" class="letrero-vuelta">1ª MEDIA VUELTA</div>
            
            <label style="color: #888; font-size: 0.8rem; display: block; margin-bottom: 5px;">ELIGE EL DESTINO:</label>
            <select id="sel-destino" class="selector-destino">
                <option value="INDIOS VERDES">INDIOS VERDES</option>
                <option value="NUEVOS PASEOS">NUEVOS PASEOS</option>
                <option value="REYES">REYES</option>
            </select>
            
            <div class="monto-actual">$<span id="suma-pantalla">0</span></div>
        </div>

        <div class="tarjeta">
            <div class="grid">
                <div class="campo"><label>$14</label><input type="number" id="v14" oninput="sumar()" placeholder="0" inputmode="numeric"></div>
                <div class="campo"><label>$55</label><input type="number" id="v55" oninput="sumar()" placeholder="0" inputmode="numeric"></div>
                <div class="campo"><label>$47</label><input type="number" id="v47" oninput="sumar()" placeholder="0" inputmode="numeric"></div>
                <div class="campo"><label>$37</label><input type="number" id="v37" oninput="sumar()" placeholder="0" inputmode="numeric"></div>
            </div>
        </div>

        <button class="btn btn-naranja" onclick="guardarYProxima()">FINALIZAR VUELTA</button>
        <button class="btn btn-gris" onclick="verPantalla('pantalla-resumen')">LIBRO DE RUTA</button>
    </div>

    <div id="pantalla-resumen" class="pantalla">
        <div class="tarjeta">
            <h2>RESUMEN DEL DÍA</h2>
            <div id="total-dia-dinero" style="font-size: 2.5rem; color: var(--p); font-weight: bold;">$0</div>
        </div>
        
        <div id="contenedor-vueltas" class="tarjeta" style="padding:0; text-align:left;"></div>
        
        <button class="btn btn-naranja" onclick="verPantalla('pantalla-cobro')">VOLVER A COBRAR</button>
        <button class="btn btn-rojo" onclick="borrarDatos()">EMPEZAR DÍA NUEVO</button>
    </div>

    <script>
        let numeroVuelta = parseInt(localStorage.getItem('bus_num_v')) || 1;
        let historialVueltas = JSON.parse(localStorage.getItem('bus_historial_v')) || [];

        function iniciar() {
            actualizarTextos();
        }

        function sumar() {
            let total = (document.getElementById('v14').value || 0) * 14 +
                        (document.getElementById('v55').value || 0) * 55 +
                        (document.getElementById('v47').value || 0) * 47 +
                        (document.getElementById('v37').value || 0) * 37;
            document.getElementById('suma-pantalla').innerText = total;
        }

        function guardarYProxima() {
            let monto = parseInt(document.getElementById('suma-pantalla').innerText);
            
            // Obtenemos el destino que el chofer eligió en el menú
            let destinoElegido = document.getElementById('sel-destino').value;
            
            if (monto === 0) {
                if (!confirm("¿Guardar vuelta con $0?")) return;
            }

            historialVueltas.push({
                vuelta: numeroVuelta,
                ruta: destinoElegido,
                dinero: monto
            });

            localStorage.setItem('bus_historial_v', JSON.stringify(historialVueltas));
            
            numeroVuelta++;
            localStorage.setItem('bus_num_v', numeroVuelta);
            
            // Limpiamos los inputs
            document.getElementById('v14').value = ""; document.getElementById('v55').value = "";
            document.getElementById('v47').value = ""; document.getElementById('v37').value = "";
            
            verPantalla('pantalla-resumen');
        }

        function actualizarTextos() {
            document.getElementById('txt-vuelta-grande').innerText = numeroVuelta + "ª MEDIA VUELTA";
            
            let listaHtml = "";
            let sumaTotalDia = 0;
            
            historialVueltas.forEach(v => {
                listaHtml += `<div class="fila-historial">
                                <span><b>${v.vuelta}ª</b> ${v.ruta}</span>
                                <span>$${v.dinero}</span>
                              </div>`;
                sumaTotalDia += v.dinero;
            });

            document.getElementById('contenedor-vueltas').innerHTML = listaHtml || "<p style='padding:20px; color:#555;'>No hay vueltas registradas</p>";
            document.getElementById('total-dia-dinero').innerText = "$" + sumaTotalDia;
            sumar();
        }

        function verPantalla(id) {
            document.getElementById('pantalla-cobro').classList.remove('activa');
            document.getElementById('pantalla-resumen').classList.remove('activa');
            document.getElementById(id).classList.add('activa');
            actualizarTextos();
        }

        function borrarDatos() {
            if (confirm("¿Seguro que quieres borrar todo el historial?")) {
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html>

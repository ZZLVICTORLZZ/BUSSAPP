
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BusApp 2024</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 15px; }
        .pantalla { display: none; }
        .activa { display: block !important; }
        .tarjeta { background: #1e1e1e; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #333; }
        .btn { background: #4CAF50; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; margin-top: 10px; font-size: 1.1rem; cursor: pointer; }
        .btn-azul { background: #2196F3; }
        .btn-gris { background: #444; }
        input { background: #000; color: #4CAF50; border: 1px solid #555; padding: 10px; border-radius: 5px; width: 70%; font-size: 1.5rem; text-align: center; margin-bottom: 10px; }
        .fila { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body onload="inicializar()">

    <div id="p1" class="pantalla activa">
        <div class="tarjeta">
            <h2 id="txtVuelta">Cargando...</h2>
            <h1 id="txtDestino">---</h1>
            <div style="font-size: 2.5rem; color: #4CAF50; font-weight: bold;">$<span id="totalV">0</span></div>
        </div>

        <div class="tarjeta">
            <h3>BOLETOS</h3>
            <div class="fila">
                <div><label>$14</label><br><input type="number" id="c14" oninput="sumar()" placeholder="0"></div>
                <div><label>$55</label><br><input type="number" id="c55" oninput="sumar()" placeholder="0"></div>
                <div><label>$47</label><br><input type="number" id="c47" oninput="sumar()" placeholder="0"></div>
                <div><label>$37</label><br><input type="number" id="c37" oninput="sumar()" placeholder="0"></div>
            </div>
            
            <hr style="border: 0.5px solid #333; margin: 15px 0;">
            
            <h3>VENTA LIBRE</h3>
            <div class="fila">
                <input type="number" id="lPre" placeholder="$ Precio">
                <input type="number" id="lCant" placeholder="Cant.">
            </div>
            <button class="btn btn-azul" onclick="sumarLibre()">+ AGREGAR EXTRA</button>
        </div>

        <button class="btn" onclick="guardarVuelta()">GUARDAR MEDIA VUELTA</button>
        <button class="btn btn-gris" onclick="verLibro()">ABRIR LIBRO DE RUTA</button>
    </div>

    <div id="p2" class="pantalla">
        <div class="tarjeta">
            <h2>RESUMEN DEL DÍA</h2>
            <div id="resumenDia" style="font-size: 1.2rem; font-weight: bold;">0 Pax | $0</div>
        </div>
        <div id="lista" style="text-align: left;"></div>
        <button class="btn" onclick="verRegistro()">VOLVER A COBRAR</button>
        <button class="btn btn-gris" style="background: #b71c1c;" onclick="borrarTodo()">RESET TOTAL</button>
    </div>

    <script>
        let vActual = parseInt(localStorage.getItem('v_actual')) || 1;
        let datos = JSON.parse(localStorage.getItem('bus_datos')) || [];
        let extraDinero = 0;

        function inicializar() {
            alert("¡Sistema listo! Si ves esto, los botones ya sirven.");
            actualizarTextos();
        }

        function sumar() {
            let t = ( (document.getElementById('c14').value || 0) * 14 ) +
                    ( (document.getElementById('c55').value || 0) * 55 ) +
                    ( (document.getElementById('c47').value || 0) * 47 ) +
                    ( (document.getElementById('c37').value || 0) * 37 ) + extraDinero;
            document.getElementById('totalV').innerText = t;
        }

        function sumarLibre() {
            let p = parseFloat(document.getElementById('lPre').value) || 0;
            let c = parseInt(document.getElementById('lCant').value) || 0;
            if(p > 0 && c > 0) {
                extraDinero += (p * c);
                document.getElementById('lPre').value = "";
                document.getElementById('lCant').value = "";
                sumar();
                alert("Agregado: $" + (p*c));
            }
        }

        function guardarVuelta() {
            let p14 = parseInt(document.getElementById('c14').value) || 0;
            let p55 = parseInt(document.getElementById('c55').value) || 0;
            let p47 = parseInt(document.getElementById('c47').value) || 0;
            let p37 = parseInt(document.getElementById('c37').value) || 0;
            
            let totalP = p14 + p55 + p47 + p37;
            let totalD = (p14*14)+(p55*55)+(p47*47)+(p37*37) + extraDinero;

            if(totalP === 0 && extraDinero === 0) {
                alert("No hay nada que guardar.");
                return;
            }

            datos.push({ n: vActual, d: (vActual % 2 !== 0 ? "INDIOS VERDES" : "SANTA FE"), p: totalP, m: totalD });
            localStorage.setItem('bus_datos', JSON.stringify(datos));
            
            vActual++;
            localStorage.setItem('v_actual', vActual);
            
            // Limpiar todo
            document.getElementById('c14').value = ""; document.getElementById('c55').value = "";
            document.getElementById('c47').value = ""; document.getElementById('c37').value = "";
            extraDinero = 0;
            
            verLibro();
        }

        function actualizarTextos() {
            document.getElementById('txtVuelta').innerText = vActual + "ª MEDIA VUELTA";
            document.getElementById('txtDestino').innerText = (vActual % 2 !== 0 ? "INDIOS VERDES" : "SANTA FE");
            
            let h = ""; let sP = 0; let sD = 0;
            datos.forEach(v => {
                h += `<div class="tarjeta" style="display:flex; justify-content:space-between; padding:10px;">
                        <span><b>${v.n}ª</b> ${v.d}</span>
                        <span>${v.p} pax | <b>$${v.m}</b></span>
                      </div>`;
                sP += v.p; sD += v.m;
            });
            document.getElementById('lista').innerHTML = h;
            document.getElementById('resumenDia').innerText = sP + " Pasajeros | $" + sD + " MXN";
        }

        function verLibro() {
            document.getElementById('p1').classList.remove('activa');
            document.getElementById('p2').classList.add('activa');
            actualizarTextos();
        }

        function verRegistro() {
            document.getElementById('p2').classList.remove('activa');
            document.getElementById('p1').classList.add('activa');
            sumar();
        }

        function borrarTodo() {
            if(confirm("¿Borrar todo el día?")) {
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html>

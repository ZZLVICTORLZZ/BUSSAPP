<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BusCount MX - Profesional</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --primary: #4CAF50; --bg: #121212; --card: #1e1e1e; --text: #ffffff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; text-align: center; }
        
        /* Control de pantallas */
        .screen { display: none; }
        .active { display: block !important; }
        
        .card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        h2 { margin: 0; color: var(--primary); font-size: 1.1rem; }
        .dest { font-size: 1.4rem; font-weight: bold; margin: 5px 0; }
        
        /* Grid de Boletos */
        .grid-boletos { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .boleto-box { background: #2a2a2a; padding: 10px; border-radius: 10px; border: 1px solid #444; }
        input { background: #121212; border: 1px solid #555; color: white; padding: 10px; border-radius: 5px; width: 80%; font-size: 1.2rem; text-align: center; }

        /* Venta Libre */
        .venta-libre { border-top: 1px solid #444; margin-top: 15px; padding-top: 15px; }
        .libre-inputs { display: flex; gap: 5px; margin-top: 10px; }
        
        /* Botones */
        .btn-add { background: #2196F3; color: white; border: none; padding: 10px; border-radius: 5px; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 1.1rem; width: 100%; margin-top: 10px; cursor: pointer; }
        .btn-sec { background: #444; color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; margin-top: 10px; cursor: pointer; }

        .libro-row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #333; font-size: 0.9rem; text-align: left; }
    </style>
</head>
<body>

    <div id="screen-registro" class="screen active">
        <div class="card">
            <h2 id="txt-num-vuelta">1ª MEDIA VUELTA</h2>
            <div class="dest" id="txt-destino">INDIOS VERDES</div>
            <div style="font-size: 2.2rem; color: var(--primary); font-weight: bold;">$<span id="total-maestro">0</span></div>
            <div style="color: #888; font-size: 0.9rem;"><span id="total-pax">0</span> Pasajeros</div>
        </div>

        <div class="card">
            <h2>BOLETOS FIJOS</h2>
            <div class="grid-boletos">
                <div class="boleto-box"><label style="display:block; font-size:0.7rem;">$14</label><input type="number" id="fijo-14" oninput="calcularTotal()" inputmode="numeric"></div>
                <div class="boleto-box"><label style="display:block; font-size:0.7rem;">$55</label><input type="number" id="fijo-55" oninput="calcularTotal()" inputmode="numeric"></div>
                <div class="boleto-box"><label style="display:block; font-size:0.7rem;">$47</label><input type="number" id="fijo-47" oninput="calcularTotal()" inputmode="numeric"></div>
                <div class="boleto-box"><label style="display:block; font-size:0.7rem;">$37</label><input type="number" id="fijo-37" oninput="calcularTotal()" inputmode="numeric"></div>
            </div>

            <div class="venta-libre">
                <h2>VENTA LIBRE (EXTRA)</h2>
                <div class="libre-inputs">
                    <input type="number" id="libre-precio" placeholder="$ Precio" inputmode="numeric">
                    <input type="number" id="libre-cant" placeholder="Cant." inputmode="numeric">
                </div>
                <button class="btn-add" onclick="agregarLibre()">+ AGREGAR A LA VUELTA</button>
                <div id="lista-libre" style="font-size: 0.8rem; color: #888; margin-top: 10px;"></div>
            </div>
        </div>

        <button class="btn-main" onclick="finalizarVuelta()">FINALIZAR MEDIA VUELTA</button>
        <button class="btn-sec" onclick="irALibro()">VER LIBRO DE RUTA</button>
    </div>

    <div id="screen-libro" class="screen">
        <div class="card">
            <h2>RESUMEN DEL DÍA</h2>
            <div class="dest" id="resumen-final">0 Pax | $0 MXN</div>
        </div>
        <div id="lista-vueltas" class="card" style="padding: 0;">
            </div>
        <button class="btn-main" onclick="irARegistro()">VOLVER A REGISTRAR</button>
        <button class="btn-sec" onclick="enviarWhatsApp()">ENVIAR REPORTE AL JEFE</button>
        <button class="btn-sec" style="background: #f44336;" onclick="resetTodo()">REINICIAR TODO EL DÍA</button>
    </div>

    <script>
        // VARIABLES GLOBALES
        let vueltaActual = parseInt(localStorage.getItem('v_actual')) || 1;
        let historial = JSON.parse(localStorage.getItem('bus_historial')) || [];
        let subtotalLibre = 0;
        let paxLibre = 0;
        let detallesLibre = "";

        // 1. CALCULAR TOTAL EN PANTALLA
        function calcularTotal() {
            const v14 = (parseInt(document.getElementById('fijo-14').value) || 0) * 14;
            const v55 = (parseInt(document.getElementById('fijo-55').value) || 0) * 55;
            const v47 = (parseInt(document.getElementById('fijo-47').value) || 0) * 47;
            const v37 = (parseInt(document.getElementById('fijo-37').value) || 0) * 37;
            
            const paxFijos = (parseInt(document.getElementById('fijo-14').value) || 0) + 
                             (parseInt(document.getElementById('fijo-55').value) || 0) + 
                             (parseInt(document.getElementById('fijo-47').value) || 0) + 
                             (parseInt(document.getElementById('fijo-37').value) || 0);

            document.getElementById('total-maestro').innerText = (v14 + v55 + v47 + v37 + subtotalLibre).toLocaleString();
            document.getElementById('total-pax').innerText = paxFijos + paxLibre;
        }

        // 2. AGREGAR VENTA LIBRE
        function agregarLibre() {
            const p = parseFloat(document.getElementById('libre-precio').value);
            const c = parseInt(document.getElementById('libre-cant').value);
            
            if(!p || !c) {
                alert("Por favor pon precio y cantidad");
                return;
            }

            subtotalLibre += (p * c);
            paxLibre += c;
            detallesLibre += `${c} de $${p}, `;
            
            document.getElementById('lista-libre').innerText = "Extras anotados: " + detallesLibre;
            document.getElementById('libre-precio').value = "";
            document.getElementById('libre-cant').value = "";
            calcularTotal();
        }

        // 3. FINALIZAR VUELTA
        function finalizarVuelta() {
            const v14 = parseInt(document.getElementById('fijo-14').value) || 0;
            const v55 = parseInt(document.getElementById('fijo-55').value) || 0;
            const v47 = parseInt(document.getElementById('fijo-47').value) || 0;
            const v37 = parseInt(document.getElementById('fijo-37').value) || 0;
            
            const totalPax = v14 + v55 + v47 + v37 + paxLibre;
            const totalDinero = (v14*14)+(v55*55)+(v47*47)+(v37*37) + subtotalLibre;

            if(totalPax === 0) {
                if(!confirm("No has anotado nada. ¿Guardar vuelta en cero?")) return;
            }

            // Guardar en historial
            historial.push({
                num: vueltaActual,
                dest: vueltaActual % 2 !== 0 ? "INDIOS VERDES" : "SANTA FE",
                pax: totalPax,
                dinero: totalDinero
            });

            localStorage.setItem('bus_historial', JSON.stringify(historial));
            
            vueltaActual++;
            localStorage.setItem('v_actual', vueltaActual);
            
            // Limpiar interfaz
            document.getElementById('fijo-14').value = "";
            document.getElementById('fijo-55').value = "";
            document.getElementById('fijo-47').value = "";
            document.getElementById('fijo-37').value = "";
            subtotalLibre = 0; paxLibre = 0; detallesLibre = "";
            document.getElementById('lista-libre').innerText = "";
            
            irALibro();
        }

        // 4. ACTUALIZAR TODA LA INTERFAZ
        function actualizarUI() {
            // Textos de vuelta actual
            document.getElementById('txt-num-vuelta').innerText = (vueltaActual > 6) ? "TURNO TERMINADO" : ${vueltaActual}ª MEDIA VUELTA;
            document.getElementById('txt-destino').innerText = (vueltaActual > 6) ? "Buen descanso" : (vueltaActual % 2 !== 0 ? "INDIOS VERDES" : "SANTA FE");
            
            // Tabla del Libro de Ruta
            let html = "";
            let tP = 0;
            let tD = 0;
            
            historial.forEach(v => {
                html += `
                <div class="libro-row">
                    <span><b>${v.num}ª</b> ${v.dest}</span>
                    <span>${v.pax} pax | <b>$${v.dinero.toLocaleString()}</b></span>
                </div>`;
                tP += v.pax;
                tD += v.dinero;
            });
            
            document.getElementById('lista-vueltas').innerHTML = html || '<p style="padding:20px; color:#666;">No hay datos</p>';
            document.getElementById('resumen-final').innerText = ${tP} Pax | $${tD.toLocaleString()} MXN;
            
            calcularTotal();
        }

        // 5. NAVEGACIÓN
        function irALibro() {
            document.getElementById('screen-registro').classList.remove('active');
            document.getElementById('screen-libro').classList.add('active');
            actualizarUI();
        }

        function irARegistro() {
            if(vueltaActual > 6) {
                alert("Ya terminaste las vueltas de hoy.");
                return;
            }
            document.getElementById('screen-libro').classList.remove('active');
            document.getElementById('screen-registro').classList.add('active');
            actualizarUI();
        }

        // 6. WHATSAPP
        function enviarWhatsApp() {
            let m = *REPORTE DE RUTA - BUSCOUNT*%0A;
            historial.forEach(v => {
                m += ${v.num}ª ${v.dest}: ${v.pax} pax - $${v.dinero.toLocaleString()}%0A;
            });
            m += *TOTAL:* ${document.getElementById('resumen-final').innerText};
            window.open(https://wa.me/?text=${m}, '_blank');
        }

        // 7. RESET
        function resetTodo() {
            if(confirm("¿Seguro que quieres borrar todo el día y empezar de cero?")) {
                localStorage.clear();
                location.reload();
            }
        }

        // Al iniciar
        window.onload = actualizarUI;
    </script>
</body>
</html>
